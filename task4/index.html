<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Code Compiler & Interpreter</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for Markdown Compiling -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for Syntax Highlighting (IDE Quality) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script>
        // Configure Marked to use Highlight.js dynamically
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
            breaks: true
        });
    </script>
    
    <style>
        /* Terminal Aesthetics */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .markdown-body h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #38bdf8; /* sky-400 */
            border-bottom: 1px dashed #334155;
            padding-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .markdown-body ul {
            list-style-type: square;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .markdown-body li {
            margin-bottom: 0.5rem;
            color: #e2e8f0; /* slate-200 */
            line-height: 1.6;
        }
        .markdown-body pre {
            background-color: #020617 !important; /* slate-950 */
            border: 1px solid #1e293b;
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.5);
        }
        .markdown-body p {
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen font-sans flex flex-col items-center">
    
    <nav class="w-full border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <h1 class="text-xl font-bold text-slate-100 tracking-tight">Intelligent Code Compiler <span class="text-slate-500 font-normal">| & Interpreter</span></h1>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-7xl mx-auto px-4 py-10 flex flex-col lg:flex-row gap-8 flex-grow">
        
        <!-- Left Panel: Ingestion Phase -->
        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl">
                <h3 class="text-lg font-semibold text-white mb-2 flex items-center gap-2">
                    <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Source Code Ingestion
                </h3>
                <p class="text-sm text-slate-400 mb-6">Upload raw source code to run virtual compilation and instantly detect errors.</p>
                
                <form id="uploadForm" class="flex flex-col gap-4">
                    <label class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-900/50 hover:bg-slate-800 hover:border-slate-500 transition-all group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-3 text-slate-500 group-hover:text-sky-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="mb-1 text-sm text-slate-300 font-medium">Click to upload or drag and drop</p>
                            <p class="text-xs text-slate-500">Supports .py, .js, .java strictly.</p>
                        </div>
                        <input id="fileInput" type="file" class="hidden" accept=".py,.js,.java" required />
                    </label>
                    
                    <div id="fileInfo" class="hidden items-center gap-2 px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-sky-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span id="fileNameDisplay" class="font-mono truncate"></span>
                    </div>

                    <button type="submit" id="analyzeBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all flex items-center justify-center gap-2 focus:ring-2 focus:ring-emerald-400 focus:outline-none">
                        <span>Compile & Interpret</span>
                        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>
            </div>
            
            <!-- Context Alerts -->
            <div id="alertContainer" class="hidden p-4 rounded-xl border flex items-start gap-3 shadow-lg">
                <svg id="alertIcon" class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                <div>
                    <h4 id="alertTitle" class="font-bold text-sm"></h4>
                    <p id="alertMessage" class="text-xs mt-1 opacity-90"></p>
                </div>
            </div>
        </div>

        <!-- Right Panel: Output Terminal -->
        <div class="w-full lg:w-2/3">
            <div class="bg-[#0f172a] border border-slate-700 rounded-xl shadow-2xl overflow-hidden h-full flex flex-col min-h-[600px]">
                <!-- Terminal Header -->
                <div class="bg-slate-800/80 px-4 py-2 border-b border-slate-700 flex items-center gap-2">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                        <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    </div>
                    <span class="ml-2 text-xs font-mono text-slate-400">compiler-terminal ~ bin/bash</span>
                </div>
                
                <!-- Terminal Body -->
                <div class="p-6 flex-grow overflow-y-auto relative">
                    <div id="terminalPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 font-mono text-sm opacity-50">
                        <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Awaiting code payload injection...
                    </div>
                    
                    <div id="outputContent" class="markdown-body font-sans text-sm hidden">
                        <!-- Compiled Markdown Injected Here -->
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const uploadForm = document.getElementById('uploadForm');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const btnText = analyzeBtn.querySelector('span');
        const btnSpinner = document.getElementById('btnSpinner');
        
        const terminalPlaceholder = document.getElementById('terminalPlaceholder');
        const outputContent = document.getElementById('outputContent');
        
        const alertContainer = document.getElementById('alertContainer');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');
        const alertIcon = document.getElementById('alertIcon');

        // File Selection Logic
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                fileInfo.classList.remove('hidden');
                fileInfo.classList.add('flex');
            } else {
                fileInfo.classList.add('hidden');
                fileInfo.classList.remove('flex');
            }
        });

        function showAlert(type, title, message) {
            alertContainer.classList.remove('hidden', 'bg-red-900/50', 'border-red-500', 'text-red-200', 'bg-amber-900/50', 'border-amber-500', 'text-amber-200');
            
            if (type === 'error') {
                alertContainer.classList.add('bg-red-900/50', 'border-red-500', 'text-red-200');
                alertIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            } else if (type === 'warning') {
                alertContainer.classList.add('bg-amber-900/50', 'border-amber-500', 'text-amber-200');
                alertIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>';
            }
            
            alertTitle.textContent = title;
            alertMessage.textContent = message;
        }

        // Form Submission Logic
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                showAlert('warning', 'Validation Error', 'Please select a file to ingest.');
                return;
            }

            const validExts = ['.py', '.js', '.java'];
            const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            if (!validExts.includes(fileExt)) {
                showAlert('warning', 'Invalid File Type', 'Strictly supports .py, .js, and .java files.');
                return;
            }

            // Lock UI
            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('cursor-not-allowed', 'opacity-70');
            btnText.textContent = 'Orchestrating...';
            btnSpinner.classList.remove('hidden');
            alertContainer.classList.add('hidden');
            
            terminalPlaceholder.classList.add('hidden');
            outputContent.classList.add('hidden');
            outputContent.innerHTML = '';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/review', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (response.ok && data.success) {
                    // Parse markdown and inject
                    outputContent.innerHTML = marked.parse(data.report);
                    outputContent.classList.remove('hidden');
                    
                    // The marked parsing triggers highlight.js automatically via our config,
                    // but we ensure any missed blocks are highlighted.
                    document.querySelectorAll('pre code').forEach((block) => {
                        if (!block.classList.contains('hljs')) {
                            hljs.highlightElement(block);
                        }
                    });
                } else {
                    // Handle orchestrated backend validation errors 
                    // (e.g. LLM missing headers, UnicodeDecodeError, etc.)
                    terminalPlaceholder.classList.remove('hidden');
                    showAlert('error', `Backend Rejection (${response.status})`, data.error);
                }
            } catch (err) {
                terminalPlaceholder.classList.remove('hidden');
                showAlert('error', 'Network Failure', 'Failed to connect to the compiler backend.');
            } finally {
                // Restore UI
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('cursor-not-allowed', 'opacity-70');
                btnText.textContent = 'Compile & Interpret';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
