<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output Gallery - Multimodal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans selection:bg-indigo-500 selection:text-white flex flex-col items-center">
    
    <!-- Top Navigation -->
    <nav class="w-full max-w-6xl mx-auto px-4 py-6 flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Generation Complete</h2>
        <a href="/" class="flex items-center gap-2 px-5 py-2.5 bg-gray-900 hover:bg-gray-800 border border-gray-700 text-gray-300 font-semibold rounded-lg transition-all duration-300 hover:text-white shadow-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Create Another
        </a>
    </nav>

    <div class="container mx-auto px-4 pb-16 max-w-6xl w-full flex-grow">
        
        <!-- Gallery -->
        <div class="bg-gray-900/50 backdrop-blur-sm rounded-2xl p-8 shadow-2xl border border-gray-800 min-h-[500px] flex flex-col w-full">
            <div class="flex items-center justify-between mb-8 border-b border-gray-800 pb-4">
                <h2 class="text-3xl font-bold text-gray-100 flex items-center gap-3 tracking-tight">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Output Masterpieces
                </h2>
                <span id="countBadge" class="px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-sm font-semibold border border-indigo-500/30 hidden"></span>
            </div>
            
            <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-8 flex-grow">
                <!-- Empty State (fallback if loaded directly) -->
                <div id="emptyState" class="col-span-full flex flex-col items-center justify-center h-full min-h-[400px] text-gray-500 rounded-xl border border-dashed border-gray-700 bg-gray-950/30">
                    <div class="w-20 h-20 mb-6 rounded-full bg-gray-900 flex items-center justify-center border border-gray-800">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <p class="text-lg font-medium text-gray-400">No output found in session.</p>
                    <p class="text-sm mt-2 text-gray-600 mb-6">Return to the studio to generate art.</p>
                    <a href="/" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg shadow-lg transition-all duration-300">Go to Studio</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');
            const countBadge = document.getElementById('countBadge');
            
            // Retrieve session data
            const sessionDataStr = sessionStorage.getItem('generationResult');
            
            if (sessionDataStr) {
                try {
                    const data = JSON.parse(sessionDataStr);
                    const images = data.images || [];
                    const aspectRatio = data.aspect_ratio || '1:1 Square';
                    
                    if (images.length > 0) {
                        emptyState.remove();
                        gallery.innerHTML = '';
                        
                        countBadge.textContent = `${images.length} Generated`;
                        countBadge.classList.remove('hidden');
                        
                        images.forEach((imgSrc, index) => {
                            const imgContainer = document.createElement('div');
                            imgContainer.className = 'relative group rounded-2xl overflow-hidden border border-gray-700 bg-gray-950 flex items-center justify-center shadow-xl hover:shadow-indigo-500/20 transition-all duration-500';
                            
                            // Aspect ratio mapping for precise Tailwind visuals
                            let aspectRatioClass = 'aspect-square';
                            if (aspectRatio === '16:9 Landscape') aspectRatioClass = 'aspect-[16/9]';
                            if (aspectRatio === '9:16 Vertical') aspectRatioClass = 'aspect-[9/16]';
                            
                            imgContainer.classList.add(aspectRatioClass);
                            
                            const img = document.createElement('img');
                            // Cache busting
                            img.src = '/' + imgSrc + '?t=' + new Date().getTime() + index;
                            img.className = 'w-full h-full object-cover transition duration-700 group-hover:scale-110 group-hover:opacity-80';
                            img.alt = `Generated Masterpiece ${index + 1}`;
                            
                            // Download overlay
                            const overlay = document.createElement('div');
                            overlay.className = 'absolute inset-0 bg-gradient-to-t from-gray-950/90 via-gray-950/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6';
                            
                            const downloadBtn = document.createElement('a');
                            downloadBtn.href = '/' + imgSrc;
                            downloadBtn.download = `studio_creation_${Date.now()}_${index}.png`;
                            downloadBtn.className = 'self-center px-6 py-3 bg-white hover:bg-gray-200 text-gray-900 text-sm font-bold rounded-xl shadow-lg transform transition active:scale-95 flex items-center gap-2';
                            downloadBtn.innerHTML = `
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                Download Full Res
                            `;
                            
                            overlay.appendChild(downloadBtn);
                            imgContainer.appendChild(img);
                            imgContainer.appendChild(overlay);
                            
                            gallery.appendChild(imgContainer);
                        });
                        
                        // Clear the session storage if desired, but keeping it lets user refresh
                        // sessionStorage.removeItem('generationResult'); 
                    }
                } catch (e) {
                    console.error("Error parsing session data", e);
                }
            }
        });
    </script>
</body>
</html>
