<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #111111;
            --main-bg: #0a0a0a;
            --text-color: #f5f5f5;
            --secondary-text: #a0a0a0;
            --hover-color: #1f1f1f;
            --primary-color: #3b82f6;
            --input-bg: #1a1a1a;
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            padding: 16px 0;
            height: 100%;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 20px;
            color: var(--secondary-text);
        }

        .gemini-logo {
            font-size: 20px;
            font-weight: 500;
            background: -webkit-linear-gradient(45deg, #4285f4, #ea4335, #fbbc05, #34a853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-menu-items {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            transition: background 0.2s;
            width: max-content;
            margin-bottom: 8px;
        }

        .new-chat-btn:hover {
            background-color: #2a2a2a;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--text-color);
            cursor: pointer;
            border-radius: 24px;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: var(--hover-color);
        }

        .nav-icon {
            font-size: 18px;
            color: var(--secondary-text);
            width: 20px;
            text-align: center;
        }

        .sidebar-divider {
            height: 1px;
            background-color: #222;
            margin: 16px 16px;
        }

        .section-label {
            font-size: 12px;
            color: var(--secondary-text);
            padding: 0 16px;
            margin-bottom: 8px;
        }

        .recent-section {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 16px;
        }

        .chat-history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .chat-item:hover, .chat-item.active {
            background-color: var(--hover-color);
        }

        /* Profile Area Bottom Left */
        .profile-area {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .profile-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #795548;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 14px;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            font-size: 13px;
        }

        .profile-name {
            font-weight: 500;
        }
        
        .profile-pro {
            font-size: 11px;
            color: var(--secondary-text);
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--main-bg);
        }
        
        .main-gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0a0a0a 60%);
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 15%;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            z-index: 1;
            padding-bottom: 120px; /* Space for input */
        }

        /* Initial Centered Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through except to input */
        }

        .greeting {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 32px;
            color: var(--text-color);
        }

        /* Input Area */
        .input-wrapper {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 550px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
        }
        
        /* When on welcome screen, input is centered */
        .welcome-state .input-wrapper {
            bottom: auto;
            top: 50%;
            transform: translate(-50%, 20px); /* Slightly below greeting */
            pointer-events: auto;
        }

        .input-box {
            display: flex;
            align-items: center;
            background-color: var(--main-bg);
            border-radius: 32px;
            padding: 8px 16px;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #333;
            pointer-events: auto;
        }

        .input-box input {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: var(--text-color);
            padding: 8px 0;
        }

        .input-box input::placeholder {
            color: #72777a;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--secondary-text);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background-color: rgba(0,0,0,0.05);
        }
        
        .pro-badge {
            font-size: 13px;
            color: var(--secondary-text);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-right: 8px;
        }

        .send-btn {
            color: var(--primary-color);
            display: none; /* hidden when empty */
        }
        
        .send-btn.visible {
            display: flex;
        }

        /* Chat Bubbles */
        .message-wrapper {
            display: flex;
            margin-bottom: 24px;
            max-width: 100%;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.ai {
            justify-content: flex-start;
            gap: 16px;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            background: conic-gradient(from 180deg at 50% 50%, #4285f4 0deg, #34a853 90deg, #fbbc05 180deg, #ea4335 270deg, #4285f4 360deg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .message-content {
            padding: 12px 20px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-content {
            background-color: var(--input-bg);
            border-radius: 24px;
            color: var(--text-color);
            max-width: 80%;
        }

        .ai .message-content {
            background-color: transparent;
            color: var(--text-color);
            max-width: 85%;
            padding: 4px 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 0;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background-color: #a8c7fa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive and Toggle styles */
        .sidebar-hidden .sidebar {
            margin-left: -280px;
        }

        .top-header {
            display: flex;
            padding: 16px;
            align-items: center;
            gap: 12px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .sidebar-hidden .top-header {
            opacity: 1;
            pointer-events: auto;
        }

        .top-menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                margin-left: 0 !important;
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
                z-index: 100;
            }
            .sidebar.open {
                left: 0;
            }
            .top-header {
                opacity: 1;
                pointer-events: auto;
            }
            .chat-container {
                padding-top: 60px;
                padding-left: 5%;
                padding-right: 5%;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="menu-icon">☰</span>
            <span class="gemini-logo">Sriram</span>
        </div>
        
        <div class="sidebar-menu-items">
            <button class="new-chat-btn" onclick="startNewChat()">
                <span style="font-size: 18px;">+</span> New chat
            </button>
        </div>

        <div class="sidebar-divider"></div>
        <div class="section-label">Recent</div>

        <div class="recent-section">
            <ul class="chat-history-list" id="historyList">
                <!-- Chat history items injected here -->
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="top-header">
            <button class="top-menu-btn" id="topMenuBtn">☰</button>
            <span class="gemini-logo" style="font-size: 18px;">Sriram</span>
        </div>
        <div class="main-gradient-bg" id="mainBg"></div>

        <div class="chat-container" id="chatContainer">
            <!-- Chat messages injected here -->
        </div>

        <!-- Initial Centered Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="greeting">Ready when you are</div>
        </div>

        <div class="input-wrapper" id="inputWrapper">
            <form id="chatForm" class="input-box">
                <button type="button" class="icon-btn" style="font-size: 24px;">+</button>
                <input type="text" id="userInput" placeholder="Ask Sriram" autocomplete="off" required>
                <button type="submit" class="icon-btn send-btn" id="sendBtn">➤</button>
            </form>
        </div>
    </div>

    <script>
        // DOM Elements
        const mainContent = document.getElementById('mainContent');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainBg = document.getElementById('mainBg');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const historyList = document.getElementById('historyList');
        const topMenuBtn = document.getElementById('topMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarHeader = document.querySelector('.sidebar-header');

        // State Management
        let currentSessionId = null;
        let sessions = JSON.parse(localStorage.getItem('gemini_sessions')) || [];

        // Input validation & Icon toggle
        userInput.addEventListener('input', () => {
            const hasText = userInput.value.trim() !== '';
            if (hasText) {
                sendBtn.classList.add('visible');
            } else {
                sendBtn.classList.remove('visible');
            }
        });

        // Sidebar Toggles
        topMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
            } else {
                document.body.classList.remove('sidebar-hidden');
            }
        });
        
        sidebarHeader.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
            } else {
                document.body.classList.add('sidebar-hidden');
            }
        });

        mainContent.addEventListener('click', () => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

        // Initialize App
        function init() {
            renderHistoryList();
            startNewChat();
        }

        // Generate a random ID
        function generateId() {
            return Math.random().toString(36).substring(2, 15);
        }

        // Render Sidebar History
        function renderHistoryList() {
            historyList.innerHTML = '';
            // Sort by newest first based on an implied order
            const sortedSessions = [...sessions].reverse();
            
            sortedSessions.forEach(session => {
                const li = document.createElement('li');
                li.className = 'chat-item';
                if (session.id === currentSessionId) li.classList.add('active');
                
                li.textContent = session.title || "New Chat";
                li.onclick = () => loadSession(session.id);
                historyList.appendChild(li);
            });
        }

        // Start a New Chat
        function startNewChat() {
            currentSessionId = generateId();
            
            // Set UI to Welcome State
            mainContent.classList.add('welcome-state');
            welcomeScreen.style.display = 'flex';
            mainBg.style.opacity = '1';
            chatContainer.innerHTML = '';
            
            // Remove active class from sidebar
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            
            // Clear backend history for new session just in case
            fetch('/api/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: currentSessionId })
            }).catch(e => console.log(e));
            
            // Focus input
            userInput.focus();
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
        }

        // Switch UI to active chat mode
        function switchToActiveChat() {
            mainContent.classList.remove('welcome-state');
            welcomeScreen.style.display = 'none';
            mainBg.style.opacity = '0';
        }

        // Load an existing session
        function loadSession(id) {
            currentSessionId = id;
            const session = sessions.find(s => s.id === id);
            
            if (!session) return;
            
            switchToActiveChat();
            chatContainer.innerHTML = '';
            
            session.messages.forEach(msg => {
                appendMessageToDOM(msg.role, msg.text);
            });
            
            renderHistoryList();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
        }

        // Save current session to localStorage
        function saveSession(role, text) {
            let session = sessions.find(s => s.id === currentSessionId);
            
            if (!session) {
                // Create new session
                session = {
                    id: currentSessionId,
                    title: text.substring(0, 30) + (text.length > 30 ? '...' : ''), // First message is title
                    messages: []
                };
                sessions.push(session);
            }
            
            session.messages.push({ role, text });
            localStorage.setItem('gemini_sessions', JSON.stringify(sessions));
            renderHistoryList();
        }

        // Append a message to the UI
        function appendMessageToDOM(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;
            
            let html = '';
            if (role === 'ai') {
                html = `
                    <div class="ai-avatar">✨</div>
                    <div class="message-content">${formatText(text)}</div>
                `;
            } else {
                html = `<div class="message-content">${escapeHTML(text)}</div>`;
            }
            
            wrapper.innerHTML = html;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Show typing indicator
        function appendTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ai';
            wrapper.id = 'typingIndicator';
            
            wrapper.innerHTML = `
                <div class="ai-avatar">✨</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Handle Form Submit
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            
            switchToActiveChat();

            // UI Updates
            userInput.value = '';
            sendBtn.classList.remove('visible');
            
            appendMessageToDOM('user', text);
            saveSession('user', text);
            appendTypingIndicator();

            try {
                // Send to Flask Backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text, 
                        session_id: currentSessionId 
                    })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (!response.ok) {
                    const errorMsg = data.error || 'Connection error';
                    appendMessageToDOM('ai', `⚠️ Error: ${errorMsg}`);
                    saveSession('ai', `Error: ${errorMsg}`);
                } else {
                    appendMessageToDOM('ai', data.reply);
                    saveSession('ai', data.reply);
                }

            } catch (err) {
                removeTypingIndicator();
                appendMessageToDOM('ai', `⚠️ Network Error: ${err.message}`);
                saveSession('ai', `Network Error: ${err.message}`);
            }
            
            userInput.focus();
        });

        // Simple markdown formatter
        function formatText(text) {
            // Escape HTML first
            let formatted = escapeHTML(text);
            // Bold
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        // Escape HTML to prevent XSS
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Start
        init();
        
    </script>
</body>
</html>
